<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Nabel's AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F4EF;
      --surface: #FFFFFF;
      --surface-2: #F0EDE8;
      --border: rgba(180,155,100,0.18);
      --border-strong: rgba(180,155,100,0.35);
      --gold: #B8932A;
      --gold-light: #C9A84C;
      --gold-bg: rgba(185,147,42,0.07);
      --gold-bg-strong: rgba(185,147,42,0.12);
      --text: #1a1410;
      --text-muted: #8a7a60;
      --text-light: #b5a080;
      --user-bubble: #FFFFFF;
      --ai-bubble: #FEFCF8;
      --radius: 16px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: 22px 28px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--gold-light);
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px var(--gold-bg-strong);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .status-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74,222,128,0.5);
    }

    /* ── Chat Area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    /* ── Welcome State ── */
    .welcome {
      text-align: center;
      padding: 48px 0 36px;
    }

    .welcome-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2.5px solid var(--gold-light);
      overflow: hidden;
      margin: 0 auto 20px;
      box-shadow: 0 0 0 5px var(--gold-bg-strong), var(--shadow);
    }

    .welcome-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .welcome h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 340px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 580px;
      margin: 0 auto;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--gold);
      padding: 9px 16px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      box-shadow: var(--shadow);
    }

    .suggestion-btn:hover {
      background: var(--gold-bg-strong);
      border-color: var(--gold-light);
      color: var(--gold);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(185,147,42,0.15);
    }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      margin-top: 2px;
      overflow: hidden;
    }

    .message.user .msg-avatar {
      background: var(--gold-bg-strong);
      border: 1px solid var(--border-strong);
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.02em;
    }

    .message.ai .msg-avatar {
      border: 1.5px solid var(--gold-light);
      box-shadow: 0 0 0 2px var(--gold-bg);
    }

    .message.ai .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .msg-bubble {
      max-width: 76%;
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      box-shadow: var(--shadow);
    }

    .message.user .msg-bubble {
      background: var(--gold-bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius) 4px var(--radius) var(--radius);
      color: var(--text);
    }

    .message.ai .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      color: var(--text);
    }

    .msg-bubble strong { color: var(--gold); }
    .msg-bubble a { color: var(--gold-light); text-decoration: none; font-weight: 500; }
    .msg-bubble a:hover { text-decoration: underline; }
    .msg-bubble ul, .msg-bubble ol {
      padding-left: 18px;
      margin: 6px 0;
    }
    .msg-bubble li { margin: 4px 0; }
    .msg-bubble code {
      background: var(--gold-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--gold);
    }

    /* ── Typing Indicator ── */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 6px 0;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold-light);
      animation: bounce 1.2s infinite;
      opacity: 0.5;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input Area ── */
    .input-area {
      padding: 14px 28px 22px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border-strong);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--gold-light);
      box-shadow: 0 0 0 3px var(--gold-bg);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      line-height: 1.5;
      resize: none;
      min-height: 22px;
      max-height: 140px;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--text-light); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      opacity: 0.4;
    }

    .send-btn.active { opacity: 1; }
    .send-btn:hover.active { background: var(--gold-light); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn svg { width: 16px; height: 16px; fill: #fff; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
      margin-top: 10px;
      letter-spacing: 0.02em;
    }

    /* ── Gold divider ── */
    .gold-divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
      margin: 8px auto 0;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 16px 18px 14px; }
      .chat-area { padding: 20px 18px; }
      .input-area { padding: 12px 18px 18px; }
      .msg-bubble { max-width: 88%; }
      .welcome h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="avatar">
      <img src="nabel.jpg" alt="Nabel Alsulaiman" />
    </div>
    <div class="header-text">
      <h1>Nabel's AI Assistant</h1>
      <p>Medical Doctor · AI Entrepreneur · Builder</p>
    </div>
    <div class="status-dot">Available</div>
  </header>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-avatar">
        <img src="nabel.jpg" alt="Nabel Alsulaiman" />
      </div>
      <h2>Ask me anything about Nabel</h2>
      <div class="gold-divider"></div>
      <p style="margin-top:14px;">I know his background, projects, companies, and vision — answer in German or English.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="askSuggestion(this)">What's Nabel's background?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Tell me about SpitalVerse</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">What are his technical skills?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Was macht ihn besonders?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">What are his career goals?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Welche Projekte hat er umgesetzt?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="Ask anything about Nabel…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="handleInput()"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Powered by Claude &nbsp;·&nbsp; Nabel Alsulaiman © 2026</p>
  </div>

</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const input    = document.getElementById('input');
  const sendBtn  = document.getElementById('sendBtn');
  const welcome  = document.getElementById('welcome');

  let messages = [];
  let isLoading = false;

  function handleInput() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    const hasText = input.value.trim().length > 0;
    sendBtn.disabled = !hasText || isLoading;
    sendBtn.classList.toggle('active', hasText && !isLoading);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  }

  function askSuggestion(btn) {
    input.value = btn.textContent;
    handleInput();
    sendMessage();
  }

  function hideWelcome() {
    if (welcome) welcome.style.display = 'none';
  }

  function appendMessage(role, text) {
    hideWelcome();
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatarHtml = role === 'user'
      ? `<div class="msg-avatar" style="font-size:11px;letter-spacing:0.02em;">You</div>`
      : `<div class="msg-avatar"><img src="nabel.jpg" alt="N" /></div>`;
    div.innerHTML = `${avatarHtml}<div class="msg-bubble">${formatText(text)}</div>`;
    chatArea.appendChild(div);
    scrollBottom();
    return div;
  }

  function appendTyping() {
    hideWelcome();
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar"><img src="nabel.jpg" alt="N" /></div>
      <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    chatArea.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code>$1</code>')
      .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;
    sendBtn.classList.remove('active');

    appendMessage('user', text);
    messages.push({ role: 'user', content: text });
    appendTyping();

    try {
      const res = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        appendMessage('ai', 'Sorry, something went wrong. Please try again.');
      } else {
        appendMessage('ai', data.content);
        messages.push({ role: 'assistant', content: data.content });
      }
    } catch {
      removeTyping();
      appendMessage('ai', 'Connection error. Please try again.');
    } finally {
      isLoading = false;
      handleInput();
    }
  }
</script>
</body>
</html>
