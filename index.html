<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Nabel's AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --border: rgba(255,255,255,0.06);
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #e8e8e8;
      --text-muted: #666;
      --user-bubble: #1e1e1e;
      --ai-bubble: #141414;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border: 1.5px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--gold);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74,222,128,0.5);
    }

    /* ── Chat Area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    /* ── Welcome State ── */
    .welcome {
      text-align: center;
      padding: 40px 0 32px;
    }

    .welcome-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--gold);
      margin: 0 auto 20px;
    }

    .welcome h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 340px;
      margin: 0 auto 28px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 560px;
      margin: 0 auto;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .suggestion-btn:hover {
      border-color: rgba(201,168,76,0.4);
      background: var(--gold-dim);
      color: #fff;
    }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
    }

    .message.user .msg-avatar {
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
    }

    .message.ai .msg-avatar {
      background: var(--surface);
      border: 1px solid var(--border);
      font-family: 'Playfair Display', serif;
      color: var(--gold);
    }

    .msg-bubble {
      max-width: 78%;
      padding: 13px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .message.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius) 4px var(--radius) var(--radius);
    }

    .message.ai .msg-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
    }

    .msg-bubble strong { color: #fff; }
    .msg-bubble a { color: var(--gold); text-decoration: none; }
    .msg-bubble a:hover { text-decoration: underline; }
    .msg-bubble ul, .msg-bubble ol {
      padding-left: 18px;
      margin: 6px 0;
    }
    .msg-bubble li { margin: 3px 0; }

    /* ── Typing Indicator ── */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Input Area ── */
    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(201,168,76,0.35);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      line-height: 1.5;
      resize: none;
      min-height: 22px;
      max-height: 140px;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      opacity: 0.5;
    }

    .send-btn.active { opacity: 1; }
    .send-btn:hover.active { background: #d4a84c; transform: scale(1.04); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn svg { width: 16px; height: 16px; fill: #000; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #333;
      margin-top: 10px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 20px 16px 16px; }
      .chat-area { padding: 20px 16px; }
      .input-area { padding: 12px 16px 20px; }
      .msg-bubble { max-width: 88%; }
      .welcome h2 { font-size: 19px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="avatar">N</div>
    <div class="header-text">
      <h1>Nabel's AI Assistant</h1>
      <p>Medical Doctor · AI Entrepreneur · Builder</p>
    </div>
    <div class="status-dot">Available</div>
  </header>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-avatar">N</div>
      <h2>Ask me anything about Nabel</h2>
      <p>I know his background, projects, companies, and vision — in German or English.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="askSuggestion(this)">What's Nabel's background?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Tell me about SpitalVerse</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">What are his technical skills?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Was macht ihn besonders?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">What are his career goals?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Welche Projekte hat er umgesetzt?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="Ask anything about Nabel…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="handleInput()"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Powered by Claude · Nabel Alsulaiman © 2026</p>
  </div>

</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const input    = document.getElementById('input');
  const sendBtn  = document.getElementById('sendBtn');
  const welcome  = document.getElementById('welcome');

  let messages = [];
  let isLoading = false;

  function handleInput() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    const hasText = input.value.trim().length > 0;
    sendBtn.disabled = !hasText || isLoading;
    sendBtn.classList.toggle('active', hasText && !isLoading);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  }

  function askSuggestion(btn) {
    input.value = btn.textContent;
    handleInput();
    sendMessage();
  }

  function hideWelcome() {
    if (welcome) {
      welcome.style.display = 'none';
    }
  }

  function appendMessage(role, text) {
    hideWelcome();
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatarText = role === 'user' ? 'You' : 'N';
    div.innerHTML = `
      <div class="msg-avatar">${avatarText}</div>
      <div class="msg-bubble">${formatText(text)}</div>
    `;
    chatArea.appendChild(div);
    scrollBottom();
    return div;
  }

  function appendTyping() {
    hideWelcome();
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar">N</div>
      <div class="msg-bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    chatArea.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function formatText(text) {
    // Basic markdown-like formatting
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code>$1</code>')
      .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/^### (.+)$/gm, '<strong>$1</strong>')
      .replace(/^## (.+)$/gm, '<strong>$1</strong>')
      .replace(/^# (.+)$/gm, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;
    sendBtn.classList.remove('active');

    appendMessage('user', text);
    messages.push({ role: 'user', content: text });

    appendTyping();

    try {
      const res = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        appendMessage('ai', 'Sorry, something went wrong. Please try again.');
      } else {
        appendMessage('ai', data.content);
        messages.push({ role: 'assistant', content: data.content });
      }
    } catch {
      removeTyping();
      appendMessage('ai', 'Connection error. Please check your internet and try again.');
    } finally {
      isLoading = false;
      handleInput();
    }
  }
</script>
</body>
</html>
